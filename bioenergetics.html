<!DOCTYPE html>
<html>
<head>
  <title>GCSE Biology Speed Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e8f5e9;
      padding: 30px;
    }

    .quiz-box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      max-width: 750px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      color: #2e7d32;
    }

    #timer {
      font-size: 32px;
      font-weight: bold;
      color: #d32f2f;
    }

    .timer-warning {
      animation: pulseTimer 0.5s infinite alternate;
    }

    @keyframes pulseTimer {
      from { transform: scale(1); }
      to { transform: scale(1.25); }
    }

    #score, #answered {
      font-size: 18px;
      font-weight: bold;
      color: #2e7d32;
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 90%;
      border: none;
      border-radius: 8px;
      background: #c8e6c9;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #a5d6a7;
    }

    .start-btn, .restart-btn {
      background: #4caf50;
      color: white;
      font-size: 18px;
    }

    #feedback {
      font-weight: bold;
      margin-top: 15px;
      line-height: 1.5;
    }

    .explanation {
      color: #333;
      font-weight: normal;
    }

    .grade {
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="quiz-box">
  <h1>GCSE Biology Speed Quiz 🧬</h1>

  <div id="startScreen">
    <p>Answer as many random GCSE Biology questions as possible in 2 minutes.</p>
    <button class="start-btn" onclick="startQuiz()">Start Quiz</button>
  </div>

  <div id="quizScreen" style="display:none;">
    <p id="timer">Time: 2:00</p>
    <p id="score">Score: 0</p>
    <p id="answered">Answered: 0</p>

    <h2 id="question"></h2>
    <div id="answers"></div>

    <p id="feedback"></p>
  </div>

  <div id="endScreen" style="display:none;">
    <h2>Time's up!</h2>
    <p id="finalScore"></p>
    <p id="finalAccuracy"></p>
    <p id="finalGrade" class="grade"></p>
    <button class="restart-btn" onclick="restartQuiz()">Play Again</button>
  </div>
</div>

<script>
const quiz = [
  {
    question: "What is the function of red blood cells?",
    answers: ["Carry oxygen", "Fight disease", "Make hormones", "Digest food"],
    correct: "Carry oxygen",
    explanation: "Red blood cells contain haemoglobin, which carries oxygen around the body."
  },
  {
    question: "Which part of the cell contains genetic material?",
    answers: ["Nucleus", "Cytoplasm", "Cell membrane", "Ribosome"],
    correct: "Nucleus",
    explanation: "The nucleus contains DNA, which controls the cell's activities."
  },
  {
    question: "What is the function of ribosomes?",
    answers: ["Protein synthesis", "Photosynthesis", "Respiration", "Storage of DNA"],
    correct: "Protein synthesis",
    explanation: "Ribosomes are where proteins are made."
  },
  {
    question: "What controls what enters and leaves a cell?",
    answers: ["Cell membrane", "Nucleus", "Mitochondria", "Ribosome"],
    correct: "Cell membrane",
    explanation: "The cell membrane controls the movement of substances in and out of the cell."
  },
  {
    question: "Where does aerobic respiration happen?",
    answers: ["Mitochondria", "Nucleus", "Cell wall", "Vacuole"],
    correct: "Mitochondria",
    explanation: "Mitochondria release energy during aerobic respiration."
  },
  {
    question: "What is diffusion?",
    answers: ["Movement from high to low concentration", "Movement from low to high concentration", "Movement of water only", "Movement using energy"],
    correct: "Movement from high to low concentration",
    explanation: "Diffusion is the net movement of particles from a high concentration to a low concentration."
  },
  {
    question: "What is osmosis?",
    answers: ["Movement of water through a partially permeable membrane", "Movement of oxygen", "Movement of glucose", "Movement using energy"],
    correct: "Movement of water through a partially permeable membrane",
    explanation: "Osmosis is the movement of water across a partially permeable membrane."
  },
  {
    question: "What is active transport?",
    answers: ["Movement against a concentration gradient using energy", "Movement down a concentration gradient", "Movement of water only", "Movement without energy"],
    correct: "Movement against a concentration gradient using energy",
    explanation: "Active transport uses energy to move substances from low to high concentration."
  },
  {
    question: "What is the word equation for photosynthesis?",
    answers: ["Carbon dioxide + water → glucose + oxygen", "Glucose + oxygen → carbon dioxide + water", "Oxygen + water → glucose", "Glucose → oxygen + water"],
    correct: "Carbon dioxide + water → glucose + oxygen",
    explanation: "Photosynthesis uses carbon dioxide and water to make glucose and oxygen."
  },
  {
    question: "What green pigment absorbs light?",
    answers: ["Chlorophyll", "Haemoglobin", "Insulin", "Amylase"],
    correct: "Chlorophyll",
    explanation: "Chlorophyll absorbs light energy for photosynthesis."
  },
  {
    question: "Plants store glucose as what?",
    answers: ["Starch", "Protein", "Fatty acids", "Oxygen"],
    correct: "Starch",
    explanation: "Plants store extra glucose as starch because starch is insoluble."
  },
  {
    question: "What is aerobic respiration?",
    answers: ["Releasing energy from glucose using oxygen", "Making glucose using light", "Breaking down food in the stomach", "Moving water into cells"],
    correct: "Releasing energy from glucose using oxygen",
    explanation: "Aerobic respiration releases energy from glucose using oxygen."
  },
  {
    question: "What are the products of aerobic respiration?",
    answers: ["Carbon dioxide and water", "Glucose and oxygen", "Lactic acid only", "Protein and oxygen"],
    correct: "Carbon dioxide and water",
    explanation: "Aerobic respiration produces carbon dioxide and water."
  },
  {
    question: "What is anaerobic respiration in muscles?",
    answers: ["Glucose → lactic acid", "Glucose + oxygen → carbon dioxide + water", "Carbon dioxide + water → glucose", "Lactic acid → glucose"],
    correct: "Glucose → lactic acid",
    explanation: "In muscles, anaerobic respiration breaks down glucose into lactic acid."
  },
  {
    question: "Which organ pumps blood?",
    answers: ["Heart", "Lungs", "Kidney", "Liver"],
    correct: "Heart",
    explanation: "The heart pumps blood around the body."
  },
  {
    question: "Which blood vessels carry blood away from the heart?",
    answers: ["Arteries", "Veins", "Capillaries", "Valves"],
    correct: "Arteries",
    explanation: "Arteries carry blood away from the heart."
  },
  {
    question: "Which blood vessels carry blood towards the heart?",
    answers: ["Veins", "Arteries", "Capillaries", "Alveoli"],
    correct: "Veins",
    explanation: "Veins carry blood back towards the heart."
  },
  {
    question: "Where does gas exchange happen in the lungs?",
    answers: ["Alveoli", "Bronchi", "Trachea", "Diaphragm"],
    correct: "Alveoli",
    explanation: "Alveoli have thin walls and a good blood supply, making them efficient for gas exchange."
  },
  {
    question: "What do white blood cells do?",
    answers: ["Defend against pathogens", "Carry oxygen", "Clot blood", "Transport glucose only"],
    correct: "Defend against pathogens",
    explanation: "White blood cells help protect the body from disease."
  },
  {
    question: "Which enzyme breaks down starch?",
    answers: ["Amylase", "Protease", "Lipase", "Catalase"],
    correct: "Amylase",
    explanation: "Amylase breaks down starch into sugars."
  },
  {
    question: "Which enzyme breaks down proteins?",
    answers: ["Protease", "Amylase", "Lipase", "Insulin"],
    correct: "Protease",
    explanation: "Protease enzymes break proteins into amino acids."
  },
  {
    question: "Which enzyme breaks down lipids?",
    answers: ["Lipase", "Amylase", "Protease", "Pepsin"],
    correct: "Lipase",
    explanation: "Lipase breaks lipids into fatty acids and glycerol."
  },
  {
    question: "Where is bile produced?",
    answers: ["Liver", "Stomach", "Pancreas", "Small intestine"],
    correct: "Liver",
    explanation: "Bile is produced in the liver and stored in the gall bladder."
  },
  {
    question: "What does bile do?",
    answers: ["Neutralises acid and emulsifies fats", "Breaks down starch", "Carries oxygen", "Makes insulin"],
    correct: "Neutralises acid and emulsifies fats",
    explanation: "Bile neutralises stomach acid and breaks fat into smaller droplets."
  },
  {
    question: "What is a pathogen?",
    answers: ["A microorganism that causes disease", "A type of blood cell", "A plant hormone", "A digestive enzyme"],
    correct: "A microorganism that causes disease",
    explanation: "A pathogen is a microorganism that can cause disease."
  },
  {
    question: "Which disease is caused by a virus?",
    answers: ["Measles", "Salmonella", "Rose black spot", "Malaria"],
    correct: "Measles",
    explanation: "Measles is caused by a virus."
  },
  {
    question: "Which disease is caused by bacteria?",
    answers: ["Salmonella", "Measles", "HIV", "Tobacco mosaic virus"],
    correct: "Salmonella",
    explanation: "Salmonella is caused by bacteria and can cause food poisoning."
  },
  {
    question: "Which disease is caused by a protist?",
    answers: ["Malaria", "Measles", "Salmonella", "HIV"],
    correct: "Malaria",
    explanation: "Malaria is caused by a protist and is spread by mosquitoes."
  },
  {
    question: "What do vaccines contain?",
    answers: ["Dead or weakened pathogens/antigens", "Antibiotics", "Red blood cells", "Digestive enzymes"],
    correct: "Dead or weakened pathogens/antigens",
    explanation: "Vaccines stimulate the immune system to produce antibodies."
  },
  {
    question: "What do antibiotics treat?",
    answers: ["Bacterial infections", "Viral infections", "All diseases", "Genetic disorders"],
    correct: "Bacterial infections",
    explanation: "Antibiotics kill bacteria or stop them growing, but they do not work on viruses."
  },
  {
    question: "What hormone controls blood glucose?",
    answers: ["Insulin", "Adrenaline", "Oestrogen", "Testosterone"],
    correct: "Insulin",
    explanation: "Insulin lowers blood glucose by helping cells take in glucose."
  },
  {
    question: "Where is insulin produced?",
    answers: ["Pancreas", "Liver", "Kidney", "Brain"],
    correct: "Pancreas",
    explanation: "The pancreas produces insulin."
  },
  {
    question: "What is homeostasis?",
    answers: ["Maintaining a stable internal environment", "Making glucose", "Digesting food", "Producing sperm"],
    correct: "Maintaining a stable internal environment",
    explanation: "Homeostasis keeps conditions inside the body stable."
  },
  {
    question: "What is DNA?",
    answers: ["Genetic material", "A type of enzyme", "A hormone", "A blood cell"],
    correct: "Genetic material",
    explanation: "DNA carries genetic instructions for inherited characteristics."
  },
  {
    question: "What is a gene?",
    answers: ["A section of DNA coding for a characteristic", "A type of cell", "A type of protein only", "A sex cell"],
    correct: "A section of DNA coding for a characteristic",
    explanation: "A gene is a section of DNA that codes for a characteristic or protein."
  },
  {
    question: "How many chromosomes are in a normal human body cell?",
    answers: ["46", "23", "22", "44"],
    correct: "46",
    explanation: "Human body cells normally contain 46 chromosomes."
  },
  {
    question: "How many chromosomes are in a human gamete?",
    answers: ["23", "46", "12", "92"],
    correct: "23",
    explanation: "Gametes have 23 chromosomes, half the number in body cells."
  },
  {
    question: "What is mitosis used for?",
    answers: ["Growth and repair", "Making gametes", "Fertilisation", "Evolution"],
    correct: "Growth and repair",
    explanation: "Mitosis makes genetically identical cells for growth and repair."
  },
  {
    question: "What is meiosis used for?",
    answers: ["Making gametes", "Growth", "Repair", "Cloning body cells"],
    correct: "Making gametes",
    explanation: "Meiosis makes gametes with half the normal number of chromosomes."
  },
  {
    question: "What is natural selection?",
    answers: ["Better adapted organisms survive and reproduce", "All organisms survive equally", "Organisms choose traits", "Genes never change"],
    correct: "Better adapted organisms survive and reproduce",
    explanation: "Natural selection means organisms with useful adaptations are more likely to survive and pass on their genes."
  },
  {
    question: "Who proposed evolution by natural selection?",
    answers: ["Charles Darwin", "Isaac Newton", "Louis Pasteur", "Gregor Mendel"],
    correct: "Charles Darwin",
    explanation: "Charles Darwin proposed the theory of evolution by natural selection."
  },
  {
    question: "What is an ecosystem?",
    answers: ["Community of organisms and their environment", "One animal only", "Only plants in an area", "Only non-living factors"],
    correct: "Community of organisms and their environment",
    explanation: "An ecosystem includes living organisms and the non-living environment."
  },
  {
    question: "What is a producer?",
    answers: ["An organism that makes its own food", "An animal that eats plants", "A decomposer", "A predator"],
    correct: "An organism that makes its own food",
    explanation: "Producers, such as plants, make their own food by photosynthesis."
  },
  {
    question: "What do decomposers do?",
    answers: ["Break down dead organisms", "Make glucose using light", "Carry oxygen", "Produce sperm"],
    correct: "Break down dead organisms",
    explanation: "Decomposers break down dead material and recycle nutrients."
  },
  {
    question: "Which plant tissue transports water?",
    answers: ["Xylem", "Phloem", "Epidermis", "Palisade"],
    correct: "Xylem",
    explanation: "Xylem transports water and mineral ions from roots to leaves."
  },
  {
    question: "Which plant tissue transports sugars?",
    answers: ["Phloem", "Xylem", "Root hair", "Guard cells"],
    correct: "Phloem",
    explanation: "Phloem transports dissolved sugars around the plant."
  },
  {
    question: "What is transpiration?",
    answers: ["Loss of water vapour from leaves", "Movement of sugar in phloem", "Absorption of glucose", "Release of oxygen in respiration"],
    correct: "Loss of water vapour from leaves",
    explanation: "Transpiration is the loss of water vapour from the leaves through stomata."
  },
  {
    question: "Which cells open and close stomata?",
    answers: ["Guard cells", "Root hair cells", "Palisade cells", "Sperm cells"],
    correct: "Guard cells",
    explanation: "Guard cells control the opening and closing of stomata."
  },
  {
    question: "What do root hair cells absorb?",
    answers: ["Water and mineral ions", "Oxygen only", "Glucose only", "Starch only"],
    correct: "Water and mineral ions",
    explanation: "Root hair cells absorb water by osmosis and mineral ions by active transport."
  }
];

let questions = [];
let currentQuestion = 0;
let score = 0;
let answered = 0;
let timeLeft = 120;
let timer;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function formatTime(seconds) {
  let mins = Math.floor(seconds / 60);
  let secs = seconds % 60;

  if (secs < 10) {
    secs = "0" + secs;
  }

  return mins + ":" + secs;
}

function startQuiz() {
  questions = shuffle([...quiz]);
  currentQuestion = 0;
  score = 0;
  answered = 0;
  timeLeft = 120;

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("endScreen").style.display = "none";
  document.getElementById("quizScreen").style.display = "block";

  document.getElementById("timer").classList.remove("timer-warning");

  updateStats();
  showQuestion();

  clearInterval(timer);

  timer = setInterval(() => {
    timeLeft--;
    updateStats();

    if (timeLeft <= 10) {
      document.getElementById("timer").classList.add("timer-warning");
    }

    if (timeLeft <= 0) {
      endQuiz();
    }
  }, 1000);
}

function updateStats() {
  document.getElementById("score").textContent = "Score: " + score;
  document.getElementById("answered").textContent = "Answered: " + answered;
  document.getElementById("timer").textContent = "Time: " + formatTime(timeLeft);
}

function showQuestion() {
  if (currentQuestion >= questions.length) {
    questions = shuffle([...quiz]);
    currentQuestion = 0;
  }

  const q = questions[currentQuestion];

  document.getElementById("question").textContent = q.question;
  document.getElementById("feedback").innerHTML = "";

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  const shuffledAnswers = shuffle([...q.answers]);

  shuffledAnswers.forEach(answer => {
    const button = document.createElement("button");
    button.textContent = answer;
    button.onclick = () => checkAnswer(answer);
    answersDiv.appendChild(button);
  });
}

function checkAnswer(selectedAnswer) {
  const q = questions[currentQuestion];
  answered++;

  const buttons = document.querySelectorAll("#answers button");
  buttons.forEach(button => button.disabled = true);

  if (selectedAnswer === q.correct) {
    score++;
    document.getElementById("feedback").innerHTML =
      "Correct! ✅<br><span class='explanation'><strong>Explanation:</strong> " + q.explanation + "</span>";
    document.getElementById("feedback").style.color = "green";
  } else {
    document.getElementById("feedback").innerHTML =
      "Wrong ❌ Correct answer: " + q.correct +
      "<br><span class='explanation'><strong>Explanation:</strong> " + q.explanation + "</span>";
    document.getElementById("feedback").style.color = "red";
  }

  updateStats();
  currentQuestion++;

  setTimeout(showQuestion, 2500);
}

function endQuiz() {
  clearInterval(timer);

  document.getElementById("timer").classList.remove("timer-warning");
  document.getElementById("quizScreen").style.display = "none";
  document.getElementById("endScreen").style.display = "block";

  let accuracy = answered === 0 ? 0 : Math.round((score / answered) * 100);
  let grade = "";

  if (accuracy < 66) {
    grade = "FAIL";
  } else if (accuracy < 80) {
    grade = "PASS";
  } else if (accuracy < 90) {
    grade = "MERIT";
  } else {
    grade = "DISTINCTION";
  }

  document.getElementById("finalScore").textContent = "Score: " + score + " / " + answered;
  document.getElementById("finalAccuracy").textContent = "Accuracy: " + accuracy + "%";
  document.getElementById("finalGrade").textContent = "Grade: " + grade;
}

function restartQuiz() {
  startQuiz();
}
</script>

</body>
</html>
