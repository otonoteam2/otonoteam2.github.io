<!DOCTYPE html>
<html>
<head>
  <title>C5 Energy Changes Quiz</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffebee;
      padding: 30px;
    }

    .quiz-box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      max-width: 750px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      color: #c62828;
    }

    #timer {
      font-size: 32px;
      font-weight: bold;
      color: #d32f2f;
    }

    .timer-warning {
      animation: pulseTimer 0.5s infinite alternate;
    }

    @keyframes pulseTimer {
      from { transform: scale(1); }
      to { transform: scale(1.25); }
    }

    #score, #answered {
      font-size: 18px;
      font-weight: bold;
      color: #c62828;
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 90%;
      border: none;
      border-radius: 8px;
      background: #ffcdd2;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #ef9a9a;
    }

    .start-btn, .restart-btn {
      background: #c62828;
      color: white;
      font-size: 18px;
    }

    #feedback {
      font-weight: bold;
      margin-top: 15px;
      line-height: 1.5;
    }

    .explanation {
      color: #333;
      font-weight: normal;
    }

    .grade {
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="quiz-box">

  <h1>C5 Energy Changes Quiz 🔴</h1>

  <div id="startScreen">
    <p>Answer as many C5 Energy Changes questions as possible in 2 minutes.</p>
    <button class="start-btn" onclick="startQuiz()">Start Quiz</button>
  </div>

  <div id="quizScreen" style="display:none;">
    <p id="timer">Time: 2:00</p>
    <p id="score">Score: 0</p>
    <p id="answered">Answered: 0</p>

    <h2 id="question"></h2>
    <div id="answers"></div>

    <p id="feedback"></p>
  </div>

  <div id="endScreen" style="display:none;">
    <h2>Time's up!</h2>
    <p id="finalScore"></p>
    <p id="finalAccuracy"></p>
    <p id="finalGrade" class="grade"></p>

    <button class="restart-btn" onclick="restartQuiz()">Play Again</button>
  </div>

</div>

<script>

const quiz = [

{
question: "What happens in an exothermic reaction?",
answers: [
"Energy is transferred to the surroundings",
"Energy is taken in from the surroundings",
"No energy is transferred",
"The temperature always decreases"
],
correct: "Energy is transferred to the surroundings",
explanation: "Exothermic reactions release energy to the surroundings."
},

{
question: "What happens in an endothermic reaction?",
answers: [
"Energy is taken in from the surroundings",
"Energy is released to the surroundings",
"No energy change happens",
"The temperature always increases"
],
correct: "Energy is taken in from the surroundings",
explanation: "Endothermic reactions absorb energy from the surroundings."
},

{
question: "What usually happens to temperature during an exothermic reaction?",
answers: [
"It increases",
"It decreases",
"It stays the same",
"It freezes"
],
correct: "It increases",
explanation: "Exothermic reactions transfer heat energy to the surroundings, making them warmer."
},

{
question: "What usually happens to temperature during an endothermic reaction?",
answers: [
"It decreases",
"It increases",
"It boils",
"It stays constant"
],
correct: "It decreases",
explanation: "Endothermic reactions absorb heat energy from the surroundings."
},

{
question: "Which type of reaction is combustion?",
answers: [
"Exothermic",
"Endothermic",
"Neutral",
"Reversible"
],
correct: "Exothermic",
explanation: "Combustion reactions release heat energy."
},

{
question: "Which type of reaction is thermal decomposition?",
answers: [
"Endothermic",
"Exothermic",
"Neutral",
"Oxidation only"
],
correct: "Endothermic",
explanation: "Thermal decomposition requires heat energy."
},

{
question: "Which type of reaction is photosynthesis?",
answers: [
"Endothermic",
"Exothermic",
"Combustion",
"Neutralisation"
],
correct: "Endothermic",
explanation: "Photosynthesis takes in energy from sunlight."
},

{
question: "Which type of reaction is respiration?",
answers: [
"Exothermic",
"Endothermic",
"Neutral",
"Electrolysis"
],
correct: "Exothermic",
explanation: "Respiration releases energy from glucose."
},

{
question: "What does a reaction profile show?",
answers: [
"The energy changes during a reaction",
"The colour of chemicals",
"The pH of solutions",
"The speed of particles"
],
correct: "The energy changes during a reaction",
explanation: "Reaction profiles show the energy of reactants and products."
},

{
question: "What is activation energy?",
answers: [
"The minimum energy needed for a reaction to start",
"The energy stored in products",
"The energy lost during cooling",
"The total energy in atoms"
],
correct: "The minimum energy needed for a reaction to start",
explanation: "Particles need activation energy to react."
},

{
question: "Why is activation energy needed?",
answers: [
"To break bonds in reactants",
"To make products colder",
"To stop reactions",
"To freeze particles"
],
correct: "To break bonds in reactants",
explanation: "Energy is needed to break existing chemical bonds."
},

{
question: "What happens when bonds are broken?",
answers: [
"Energy is taken in",
"Energy is released",
"No energy changes",
"Temperature always rises"
],
correct: "Energy is taken in",
explanation: "Breaking bonds is an endothermic process."
},

{
question: "What happens when bonds are formed?",
answers: [
"Energy is released",
"Energy is absorbed",
"No energy change happens",
"Particles stop moving"
],
correct: "Energy is released",
explanation: "Forming bonds transfers energy to the surroundings."
},

{
question: "What happens if more energy is released than taken in?",
answers: [
"The reaction is exothermic",
"The reaction is endothermic",
"The reaction stops",
"The products disappear"
],
correct: "The reaction is exothermic",
explanation: "Exothermic reactions release more energy than they absorb."
},

{
question: "What happens if more energy is taken in than released?",
answers: [
"The reaction is endothermic",
"The reaction is exothermic",
"The reaction becomes neutral",
"The products melt"
],
correct: "The reaction is endothermic",
explanation: "Endothermic reactions absorb more energy than they release."
},

{
question: "Which everyday item uses an exothermic reaction?",
answers: [
"Hand warmers",
"Instant cold packs",
"Freezers",
"Ice cubes"
],
correct: "Hand warmers",
explanation: "Hand warmers release heat through exothermic reactions."
},

{
question: "Which everyday item uses an endothermic reaction?",
answers: [
"Instant cold packs",
"Matches",
"Fires",
"Boilers"
],
correct: "Instant cold packs",
explanation: "Cold packs absorb energy and feel cold."
},

{
question: "What is meant by a reversible reaction?",
answers: [
"A reaction that can go forwards and backwards",
"A reaction that stops permanently",
"A reaction with no products",
"A reaction that only releases energy"
],
correct: "A reaction that can go forwards and backwards",
explanation: "Reversible reactions can produce reactants again."
},

{
question: "What symbol is used in reversible reactions?",
answers: [
"⇌",
"→",
"+",
"="
],
correct: "⇌",
explanation: "The reversible arrow shows the reaction can happen both ways."
},

{
question: "What colour does hydrated copper sulfate have?",
answers: [
"Blue",
"White",
"Green",
"Red"
],
correct: "Blue",
explanation: "Hydrated copper sulfate crystals are blue."
},

{
question: "What colour does anhydrous copper sulfate have?",
answers: [
"White",
"Blue",
"Purple",
"Yellow"
],
correct: "White",
explanation: "Anhydrous copper sulfate is white without water."
},

{
question: "What happens when hydrated copper sulfate is heated?",
answers: [
"It loses water",
"It gains water",
"It freezes",
"It melts into metal"
],
correct: "It loses water",
explanation: "Heating removes water from hydrated copper sulfate."
},

{
question: "What is the formula for hydrated copper sulfate?",
answers: [
"CuSO₄·5H₂O",
"H₂O",
"CuO",
"NaCl"
],
correct: "CuSO₄·5H₂O",
explanation: "Hydrated copper sulfate contains water molecules."
},

{
question: "What does catalyst do?",
answers: [
"Increases the rate of reaction",
"Stops reactions",
"Decreases energy released",
"Changes products formed"
],
correct: "Increases the rate of reaction",
explanation: "Catalysts speed up reactions."
},

{
question: "How does a catalyst work?",
answers: [
"Provides an alternative pathway with lower activation energy",
"Increases the temperature permanently",
"Adds more reactants",
"Breaks all bonds instantly"
],
correct: "Provides an alternative pathway with lower activation energy",
explanation: "Catalysts lower the activation energy needed."
},

{
question: "Is a catalyst used up in a reaction?",
answers: [
"No",
"Yes",
"Only in exothermic reactions",
"Only in combustion"
],
correct: "No",
explanation: "Catalysts are not used up during reactions."
},

{
question: "What type of reaction occurs in self-heating cans?",
answers: [
"Exothermic",
"Endothermic",
"Neutral",
"Photosynthesis"
],
correct: "Exothermic",
explanation: "Self-heating cans release energy as heat."
},

{
question: "Why do particles need enough energy to react?",
answers: [
"To overcome activation energy",
"To stop moving",
"To become ions",
"To freeze"
],
correct: "To overcome activation energy",
explanation: "Particles need enough energy for successful collisions."
},

{
question: "What happens to particles in a chemical reaction?",
answers: [
"Atoms are rearranged",
"Atoms are destroyed",
"New atoms are created",
"Electrons disappear"
],
correct: "Atoms are rearranged",
explanation: "Chemical reactions rearrange atoms into new substances."
},

{
question: "What is transferred in energy changes?",
answers: [
"Energy between system and surroundings",
"Only electrons",
"Only protons",
"Only neutrons"
],
correct: "Energy between system and surroundings",
explanation: "Energy is transferred between reacting chemicals and surroundings."
}

];

let questions = [];
let currentQuestion = 0;
let score = 0;
let answered = 0;
let timeLeft = 120;
let timer;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function formatTime(seconds) {
  let mins = Math.floor(seconds / 60);
  let secs = seconds % 60;

  if (secs < 10) {
    secs = "0" + secs;
  }

  return mins + ":" + secs;
}

function startQuiz() {
  questions = shuffle([...quiz]);

  currentQuestion = 0;
  score = 0;
  answered = 0;
  timeLeft = 120;

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("endScreen").style.display = "none";
  document.getElementById("quizScreen").style.display = "block";
  document.getElementById("timer").classList.remove("timer-warning");

  updateStats();
  showQuestion();

  clearInterval(timer);

  timer = setInterval(() => {
    timeLeft--;
    updateStats();

    if (timeLeft <= 10) {
      document.getElementById("timer").classList.add("timer-warning");
    }

    if (timeLeft <= 0) {
      endQuiz();
    }
  }, 1000);
}

function updateStats() {
  document.getElementById("score").textContent = "Score: " + score;
  document.getElementById("answered").textContent = "Answered: " + answered;
  document.getElementById("timer").textContent = "Time: " + formatTime(timeLeft);
}

function showQuestion() {
  if (currentQuestion >= questions.length) {
    questions = shuffle([...quiz]);
    currentQuestion = 0;
  }

  const q = questions[currentQuestion];

  document.getElementById("question").textContent = q.question;
  document.getElementById("feedback").innerHTML = "";

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  const shuffledAnswers = shuffle([...q.answers]);

  shuffledAnswers.forEach(answer => {
    const button = document.createElement("button");
    button.textContent = answer;
    button.onclick = () => checkAnswer(answer);
    answersDiv.appendChild(button);
  });
}

function checkAnswer(selectedAnswer) {
  const q = questions[currentQuestion];

  answered++;

  const buttons = document.querySelectorAll("#answers button");
  buttons.forEach(button => button.disabled = true);

  if (selectedAnswer === q.correct) {
    score++;

    document.getElementById("feedback").innerHTML =
      "Correct! ✅<br><span class='explanation'><strong>Explanation:</strong> " + q.explanation + "</span>";

    document.getElementById("feedback").style.color = "green";
  } else {
    document.getElementById("feedback").innerHTML =
      "Wrong ❌ Correct answer: " + q.correct +
      "<br><span class='explanation'><strong>Explanation:</strong> " + q.explanation + "</span>";

    document.getElementById("feedback").style.color = "red";
  }

  updateStats();

  currentQuestion++;

  setTimeout(showQuestion, 2500);
}

function endQuiz() {
  clearInterval(timer);

  document.getElementById("quizScreen").style.display = "none";
  document.getElementById("endScreen").style.display = "block";

  let accuracy = answered === 0 ? 0 : Math.round((score / answered) * 100);

  let grade = "";

  if (accuracy < 66) {
    grade = "FAIL";
  } else if (accuracy < 80) {
    grade = "PASS";
  } else if (accuracy < 90) {
    grade = "MERIT";
  } else {
    grade = "DISTINCTION";
  }

  document.getElementById("finalScore").textContent =
    "Score: " + score + " / " + answered;

  document.getElementById("finalAccuracy").textContent =
    "Accuracy: " + accuracy + "%";

  document.getElementById("finalGrade").textContent =
    "Grade: " + grade;
}

function restartQuiz() {
  startQuiz();
}

</script>

</body>
</html>
