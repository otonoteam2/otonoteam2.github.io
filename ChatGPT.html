<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #121212;
      color: #eeeeee;
    }

    header {
      padding: 16px 20px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      background: #1f1f1f;
      color: #00e5ff;
      border-bottom: 1px solid #2f2f2f;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      background: #181818;
    }

    .message {
      max-width: 75%;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 0.98rem;
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.25);
    }

    .user-msg {
      align-self: flex-end;
      background: #00e5ff;
      color: #000;
      border-bottom-right-radius: 4px;
    }

    .bot-msg {
      align-self: flex-start;
      background: #2d2d2d;
      color: #f0f0f0;
      border-bottom-left-radius: 4px;
    }

    .system-msg {
      align-self: center;
      background: #242424;
      color: #bbbbbb;
      font-size: 0.9rem;
      max-width: 90%;
      text-align: center;
    }

    .typing {
      opacity: 0.75;
      font-style: italic;
    }

    #input-area {
      display: flex;
      gap: 12px;
      padding: 16px;
      background: #1f1f1f;
      border-top: 1px solid #2f2f2f;
    }

    #user-input {
      flex: 1;
      resize: none;
      min-height: 52px;
      max-height: 140px;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #101010;
      color: #fff;
      font: inherit;
      outline: none;
    }

    #user-input:focus {
      border-color: #00e5ff;
    }

    #send-btn {
      border: none;
      border-radius: 10px;
      padding: 0 18px;
      font-weight: 700;
      background: #00e5ff;
      color: #000;
      cursor: pointer;
      transition: 0.2s ease;
    }

    #send-btn:hover {
      background: #00c7de;
    }

    #send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #chat-container::-webkit-scrollbar {
      width: 8px;
    }

    #chat-container::-webkit-scrollbar-thumb {
      background: rgba(0, 229, 255, 0.35);
      border-radius: 999px;
    }

    code {
      background: #111;
      padding: 2px 5px;
      border-radius: 6px;
      font-family: Consolas, monospace;
    }
  </style>
</head>
<body>
  <header>ChatGPT Pro+</header>

  <div id="chat-container">
    <div class="message system-msg">
      Connected UI ready. Add your backend to make the assistant respond for real.
    </div>
  </div>

  <form id="input-area">
    <textarea
      id="user-input"
      rows="2"
      placeholder="Ask anything..."
    ></textarea>
    <button id="send-btn" type="submit">Send</button>
  </form>

  <script>
    const chatContainer = document.getElementById("chat-container");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    const messages = [
      {
        role: "system",
        content: "You are a helpful, friendly, smart AI assistant."
      }
    ];

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function appendMessage(text, className) {
      const msgDiv = document.createElement("div");
      msgDiv.className = `message ${className}`;
      msgDiv.textContent = text;
      chatContainer.appendChild(msgDiv);
      scrollToBottom();
      return msgDiv;
    }

    function autoResizeTextarea() {
      userInput.style.height = "auto";
      userInput.style.height = Math.min(userInput.scrollHeight, 140) + "px";
    }

    async function getBotResponse(chatHistory) {
      // REAL MODE:
      // Replace this with your backend endpoint.
      // Example expected backend response:
      // { "reply": "Hello! How can I help you?" }

      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "gpt-4.1", // replace with any real backend-supported model
          messages: chatHistory
        })
      });

      if (!response.ok) {
        throw new Error(`Server error: ${response.status}`);
      }

      const data = await response.json();

      if (!data.reply || typeof data.reply !== "string") {
        throw new Error("Invalid response format from server.");
      }

      return data.reply;
    }

    async function getFallbackResponse(userMessage) {
      // Fallback only if backend is missing.
      return new Promise((resolve) => {
        setTimeout(() => {
          resolve(
            `I don't have a real backend yet, but I can still respond.\n\nYou said: "${userMessage}"\n\nTo make this real, connect /api/chat to your server.`
          );
        }, 700);
      });
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      appendMessage(message, "user-msg");
      messages.push({ role: "user", content: message });

      userInput.value = "";
      autoResizeTextarea();
      sendBtn.disabled = true;

      const typingMsg = appendMessage("Typing...", "bot-msg typing");

      try {
        let reply;

        try {
          reply = await getBotResponse(messages);
        } catch (backendErr) {
          console.warn("Backend unavailable, using fallback:", backendErr);
          reply = await getFallbackResponse(message);
        }

        typingMsg.classList.remove("typing");
        typingMsg.textContent = reply;
        messages.push({ role: "assistant", content: reply });
      } catch (err) {
        typingMsg.classList.remove("typing");
        typingMsg.textContent = "Error: Could not get response.";
        console.error(err);
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
        scrollToBottom();
      }
    }

    document.getElementById("input-area").addEventListener("submit", async (e) => {
      e.preventDefault();
      await sendMessage();
    });

    userInput.addEventListener("input", autoResizeTextarea);

    userInput.addEventListener("keydown", async (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        await sendMessage();
      }
    });

    autoResizeTextarea();
  </script>
</body>
</html>
